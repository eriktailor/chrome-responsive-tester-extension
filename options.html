<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Beállítások</title>
  <style>
    body { font-family: sans-serif; padding: 16px; width: 320px; }
    h2 { margin: 0 0 4px 0; font-size: 1rem; }
    p { margin: 0 0 8px 0; font-size: 0.85rem; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; }
    .buttons { display: flex; gap: 8px; margin-top: 10px; }
    button { flex: 1; padding: 6px 10px; cursor: pointer; border: none; border-radius: 4px; font-size: 0.9rem; }
    #save { background: #1a73e8; color: white; }
    #open { background: #34a853; color: white; }
    #status { display: block; margin-top: 6px; font-size: 0.85rem; color: green; }
  </style>
</head>
<body>
  <h2>Alapértelmezett URL</h2>
  <p>Ez az URL töltődik be az extension megnyitásakor!</p>
  <input type="text" id="defaultUrl" placeholder="Pl: https://example.com">
  <br>
  <div class="buttons">
    <button id="save">Mentés</button>
    <button id="open">Megnyitás</button>
  </div>
  <span id="status"></span>

  <script src="options.js"></script>
</body>
</html>
