<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Responsive Tester</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #27282b; margin: 0; }
    #framesContainer { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
    .frame-outer { display: flex; flex-direction: column; align-items: flex-start; }
    .frame-outer h3 { color: white; margin: 0 0 8px 0; font-size: 1rem; }
    .bp-label { color: #888; font-weight: normal; font-size: 0.85em; margin-left: 4px; }
    .frame-wrapper { position: relative; overflow: hidden; min-width: 100px; min-height: 200px; height: 94vh; border: 1px solid #aaaaaa67; background: #fff; }
    .frame-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }
    .resize-handle { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, #aaaaaa99 50%); z-index: 10; }
  </style>
</head>
<body>
<div id="framesContainer"></div>

  <script src="viewer.js"></script>
</body>
</html>
